<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formula 1 Drivers Grid">
    <title>ApexGrid - Drivers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
    <nav class="top-navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="highlight">Apex</span>Grid
            </a>
            <div class="nav-links">
                <a href="drivers.html" class="nav-link active">Drivers</a>
                <a href="teams.html" class="nav-link">Teams</a>
                <a href="seasons.html" class="nav-link">Seasons</a>
                <a href="leaderboard.html" class="nav-link">Leaderboard</a>
                <a href="game.html" class="nav-link">Game</a>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">
                <span class="theme-icon">☀️</span>
            </button>
        </div>
    </nav>
    <main class="app-main">
        <div id="loading-indicator" class="loading-state">
            <div class="spinner"></div>
            <p>Fetching latest track data...</p>
        </div>
        <div id="error-container" class="error-state hidden">
            <div class="error-icon">⚠️</div>
            <p id="error-message">Unable to load data. Please try again later.</p>
            <button id="retry-button" class="btn">Retry Connection</button>
        </div>
        <div id="dashboard-content" class="dashboard hidden">
            <section class="drivers-section">
                <h2 class="section-title">Current Grid</h2>
                <div class="page-controls" id="driver-controls">
                    <div class="search-wrap">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="driver-search" class="search-input" placeholder="Search driver or team…">
                    </div>
                    <select id="driver-team-filter" class="filter-select">
                        <option value="">All Teams</option>
                    </select>
                    <div class="sort-btns">
                        <button class="sort-btn active" id="driver-sort-az" title="Name A → Z">A → Z</button>
                        <button class="sort-btn" id="driver-sort-za" title="Name Z → A">Z → A</button>
                    </div>
                </div>
                <div class="driver-grid" id="driver-grid"></div>
                <p class="no-results hidden" id="driver-no-results">No drivers match your search / filter.</p>
            </section>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexGrid - Teams</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="highlight">Apex</span>Grid
            </a>
            <div class="nav-links">
                <a href="drivers.html" class="nav-link">Drivers</a>
                <a href="teams.html" class="nav-link active">Teams</a>
                <a href="seasons.html" class="nav-link">Seasons</a>
                <a href="leaderboard.html" class="nav-link">Leaderboard</a>
                <a href="game.html" class="nav-link">Game</a>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">
                <span class="theme-icon">☀️</span>
            </button>
        </div>
    </nav>
    <main class="app-main">
        <div id="loading-indicator" class="loading-state">
            <div class="spinner"></div>
            <p>Fetching latest team data...</p>
        </div>
        <div id="error-container" class="error-state hidden">
            <div class="error-icon">⚠️</div>
            <p id="error-message">Unable to load data. Please try again later.</p>
            <button id="retry-button" class="btn">Retry Connection</button>
        </div>
        <div id="dashboard-content" class="dashboard hidden">
            <section class="teams-section">
                <h2 class="section-title">F1 Teams</h2>
                <div class="driver-grid" id="team-grid">
                </div>
            </section>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>

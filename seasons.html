<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexGrid - Seasons</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
    <nav class="top-navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="highlight">Apex</span>Grid
            </a>
            <div class="nav-links">
                <a href="drivers.html" class="nav-link">Drivers</a>
                <a href="teams.html" class="nav-link">Teams</a>
                <a href="seasons.html" class="nav-link active">Seasons</a>
                <a href="leaderboard.html" class="nav-link">Leaderboard</a>
                <a href="game.html" class="nav-link">Game</a>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">
                <span class="theme-icon">☀️</span>
            </button>
        </div>
    </nav>
    <main class="app-main">
        <div class="seasons-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2 class="section-title" style="margin-bottom: 0;">Seasons Calendar</h2>
            <select id="season-select" style="padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1rem; cursor: pointer;">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
            </select>
        </div>
        <div id="loading-indicator" class="loading-state">
            <div class="spinner"></div>
            <p>Gathering race positions and building calendar...</p>
        </div>
        <div id="error-container" class="error-state hidden">
            <div class="error-icon">⚠️</div>
            <p id="error-message">Unable to load season data. Please try again later.</p>
            <button id="retry-button" class="btn">Retry Connection</button>
        </div>
        <div id="dashboard-content" class="dashboard hidden">
            <div class="page-controls" id="season-controls">
                <div class="search-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="season-search" class="search-input" placeholder="Search Grand Prix…">
                </div>
                <select id="season-country-filter" class="filter-select">
                    <option value="">All Countries</option>
                </select>
                <div class="sort-btns">
                    <button class="sort-btn active" id="season-sort-az" title="Name A → Z">A → Z</button>
                    <button class="sort-btn" id="season-sort-za" title="Name Z → A">Z → A</button>
                </div>
            </div>
            <div class="driver-grid" id="seasons-grid"></div>
            <p class="no-results hidden" id="season-no-results">No races match your search / filter.</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
